<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
</head>

<body bgcolor="#e8f0ff">

    <br /><br />

    <div align="center">

        <!-- Header Section -->
        <div>
            <font size="6" color="#2c3e7a"><b>Website</b></font><br />
            <font size="3" color="gray">Your journey starts here</font>
        </div>

        <hr width="400" color="#2c3e7a" />

        <!-- Title -->
        <div>
            <font size="5" color="#2c3e7a"><b>Create Account</b></font><br />
            <font color="gray">Sign up to get started for free</font>
        </div>



        <!-- Form Section -->


        <div align="center">

            <div align="left" style="width:400px;">

                <b>Name</b><br />
                <input type="text" placeholder="John" size="45" required />
                <br /><br />

                <b>Email Address</b><br />
                <input type="email" placeholder="john@example.com" size="45" required />
                <br /><br />

                <b>Phone Number</b> <font color="gray">(optional)</font><br />
                <input type="tel" placeholder="+1 234 567 8900" size="45" />
                <br /><br />

                <b>Password</b><br />
                <input type="password" placeholder="Min. 8 characters" size="45" required />
                <br /><br />

                <b>Confirm Password</b><br />
                <input type="password" placeholder="Re-enter password" size="45" required />
                <br /><br />

                <input type="checkbox" required />
                I agree to the
                <a href="#"><font color="#2c3e7a">Terms of Service</font></a> and
                <a href="#"><font color="#2c3e7a">Privacy Policy</font></a>

                <br /><br />

                <div align="center">
                    <input type="submit" value="Create My Account" />
                </div>

            </div>

        </div>
        <br />
        
        <hr width="400" color="#cccccc" />

        <!-- Footer -->
        <div>
            <font size="2" color="gray">
                © 2026 Inc. |
                <a href="#"><font color="#2c3e7a">Privacy</font></a> |
                <a href="#"><font color="#2c3e7a">Terms</font></a>
            </font>
        </div>

        <br /><br />

    </div>

</body>
</html>
