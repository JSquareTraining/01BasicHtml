<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Product Entry Page</title>
</head>
<body bgcolor="#fff8e7">

    <table border="0" cellpadding="6" cellspacing="0" width="520" align="center">

        <tr>
            <td colspan="2" align="center" bgcolor="#e65c00">
                <h2><font color="#ffffff">&#128230; Product Entry Form</font></h2>
                <p><font color="#ffe0c2">Fill in all fields to register a new product in the inventory.</font></p>
            </td>
        </tr>

        <tr>
            <td colspan="2">
                <form action="#" method="post">

                    <table border="1" cellpadding="10" cellspacing="0" width="100%">

                        <tr bgcolor="#ff8c00">
                            <td colspan="2"><font color="#ffffff"><strong>&#9654; Product Details</strong></font></td>
                        </tr>

                        <tr bgcolor="#fff3e0">
                            <td width="35%"><label for="product-name"><font color="#7f3300">Product Name:</font></label></td>
                            <td><input type="text" id="product-name" name="product_name" placeholder="Enter product name" size="30" required /></td>
                        </tr>

                        <tr bgcolor="#ffffff">
                            <td><label for="category"><font color="#7f3300">Category:</font></label></td>
                            <td>
                                <select id="category" name="category" required>
                                    <option value="" disabled selected>-- Select Category --</option>
                                    <option value="electronics">Electronics</option>
                                    <option value="clothing">Clothing</option>
                                    <option value="grocery">Grocery</option>
                                    <option value="furniture">Furniture</option>
                                    <option value="sports">Sports &amp; Outdoors</option>
                                    <option value="books">Books</option>
                                    <option value="toys">Toys &amp; Games</option>
                                </select>
                            </td>
                        </tr>

                        <tr bgcolor="#fff3e0">
                            <td><label for="price"><font color="#7f3300">Price ($):</font></label></td>
                            <td><input type="number" id="price" name="price" placeholder="0.00" min="0" step="0.01" required /></td>
                        </tr>

                        <tr bgcolor="#ffffff">
                            <td><label for="stock"><font color="#7f3300">Stock Quantity:</font></label></td>
                            <td><input type="number" id="stock" name="stock" placeholder="Enter quantity" min="0" required /></td>
                        </tr>

                        <tr bgcolor="#fff3e0">
                            <td><label for="sku"><font color="#7f3300">SKU / Code:</font></label></td>
                            <td><input type="text" id="sku" name="sku" placeholder="e.g. PRD-00123" size="30" /></td>
                        </tr>

                        <tr bgcolor="#ff8c00">
                            <td colspan="2"><font color="#ffffff"><strong>&#9654; Description &amp; Tags</strong></font></td>
                        </tr>

                        <tr bgcolor="#fff3e0">
                            <td valign="top"><label for="description"><font color="#7f3300">Description:</font></label></td>
                            <td><textarea id="description" name="description" rows="4" cols="30" placeholder="Brief product description..."></textarea></td>
                        </tr>

                        <tr bgcolor="#ffffff">
                            <td><label for="tags"><font color="#7f3300">Tags:</font></label></td>
                            <td><input type="text" id="tags" name="tags" placeholder="e.g. new, sale, featured" size="30" /></td>
                        </tr>

                        <tr bgcolor="#ff8c00">
                            <td colspan="2"><font color="#ffffff"><strong>&#9654; Availability &amp; Status</strong></font></td>
                        </tr>

                        <tr bgcolor="#fff3e0">
                            <td valign="top"><font color="#7f3300">Availability:</font></td>
                            <td>
                                <input type="radio" id="in-stock" name="availability" value="in-stock" checked />
                                <label for="in-stock">In Stock</label><br>
                                <input type="radio" id="out-of-stock" name="availability" value="out-of-stock" />
                                <label for="out-of-stock">Out of Stock</label><br>
                                <input type="radio" id="pre-order" name="availability" value="pre-order" />
                                <label for="pre-order">Pre-Order</label>
                            </td>
                        </tr>

                        <tr bgcolor="#ffffff">
                            <td valign="top"><font color="#7f3300">Options:</font></td>
                            <td>
                                <input type="checkbox" id="featured" name="featured" value="yes" />
                                <label for="featured">Mark as Featured</label><br>
                                <input type="checkbox" id="discount" name="discount" value="yes" />
                                <label for="discount">Eligible for Discount</label>
                            </td>
                        </tr>

                        <tr bgcolor="#e65c00">
                            <td colspan="2" align="center">
                                <br>
                                <input type="submit" value="&#10003; Add Product" />
                                &nbsp;&nbsp;
                                <input type="reset" value="&#10007; Clear Form" />
                                <br><br>
                            </td>
                        </tr>

                    </table>

                </form>
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <br><small><font color="#7f3300">&#9888; All required fields must be filled before submission.</font></small>
            </td>
        </tr>

    </table>

</body>
</html>
