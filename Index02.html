<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Student Registration Form</title>
    <style>
        body {
            background-color: #d6eaf8;
        }

        form {
            background-color: #ffffff;
            width: 400px;
            margin: 40px auto;
            padding: 24px;
            border: 1px solid #aab7c4;
        }

        fieldset {
            background-color: #eaf4fb;
            border: 1px solid #aab7c4;
            padding: 16px;
        }

        h2 {
            text-align: center;
            color: #1a5276;
        }

        input[type="submit"] {
            background-color: #1a5276;
            color: white;
            padding: 8px 20px;
            border: none;
            cursor: pointer;
        }

            input[type="submit"]:hover {
                background-color: #2e86c1;
            }
    </style>
</head>
<body>

    <h2>Student Registration Form</h2>

    <form action="#" method="post">

        <fieldset>
            <legend>Personal Information</legend>

            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required /><br><br>

            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email" required /><br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male" required />
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female" />
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="other" />
            <label for="other">Other</label><br><br>

        </fieldset>

        <br>

        <fieldset>
            <legend>Course Selection</legend>

            <label for="department">Department:</label><br>
            <select id="department" name="department" required>
                <option value="" disabled selected>Select department</option>
                <option value="cs">Computer Science</option>
                <option value="eng">Engineering</option>
                <option value="biz">Business Administration</option>
                <option value="arts">Arts &amp; Humanities</option>
                <option value="sci">Natural Sciences</option>
            </select><br><br>

            <label>Preferred Courses:</label><br>
            <input type="checkbox" id="algo" name="courses" value="algorithms" />
            <label for="algo">Algorithms</label><br>
            <input type="checkbox" id="ds" name="courses" value="data-science" />
            <label for="ds">Data Science</label><br>
            <input type="checkbox" id="ml" name="courses" value="machine-learning" />
            <label for="ml">Machine Learning</label><br>
            <input type="checkbox" id="web" name="courses" value="web-dev" />
            <label for="web">Web Development</label><br><br>

        </fieldset>

        <br>
        <input type="submit" value="Submit Registration" />

    </form>

</body>
</html>
